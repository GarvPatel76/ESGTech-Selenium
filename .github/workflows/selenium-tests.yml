name: Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual run from GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Selenium Tests
      run: mvn clean test
      env:
        CI: true
        
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always() # Ensure report is uploaded even if tests fail
      with:
        name: Extent-Test-Report
        path: test-output/
        retention-days: 7
